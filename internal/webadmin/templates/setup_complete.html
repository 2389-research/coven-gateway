{{/* ABOUTME: Setup completion page — Svelte island with noscript fallback */}}
{{/* ABOUTME: Displays success and optional API token that must be saved */}}
{{define "content"}}
<div data-island="setup-complete">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm space-y-4">
      <h1 class="text-xl font-bold">Setup Complete</h1>
      <p>Welcome, {{.DisplayName}}!</p>
      {{if .HasToken}}
      <div class="p-4 border" style="background-color:#fefce8;border-color:#fef08a">
        <p class="font-bold mb-2">Save this API token — it won't be shown again:</p>
        <pre class="text-xs break-all whitespace-pre-wrap" aria-label="API Token">{{.APIToken}}</pre>
      </div>
      {{end}}
      <a href="/" class="block w-full p-2 bg-blue-600 text-white text-center">Start Chatting</a>
    </div>
  </div>
</noscript>
{{end}}
