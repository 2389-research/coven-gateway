{{/* ABOUTME: Setup completion page — Svelte island with noscript fallback */}}
{{/* ABOUTME: Displays success and optional API token that must be saved */}}
{{define "content"}}
<div data-island="setup-complete">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div style="width:100%;max-width:24rem">
      <h1 style="font-size:1.25rem;font-weight:bold;margin-bottom:1rem">Setup Complete</h1>
      <p style="margin-bottom:1rem">Welcome, {{.DisplayName}}!</p>
      {{if .HasToken}}
      <div style="padding:1rem;background:#fefce8;border:1px solid #fef08a;margin-bottom:1rem">
        <p style="font-weight:bold;margin-bottom:0.5rem">Save this API token — it won't be shown again:</p>
        <pre style="font-size:0.75rem;word-break:break-all;white-space:pre-wrap" aria-label="API Token">{{.APIToken}}</pre>
      </div>
      {{end}}
      <a href="/" style="display:block;width:100%;padding:0.5rem;background:#2563eb;color:#fff;text-align:center;text-decoration:none">Start Chatting</a>
    </div>
  </div>
</noscript>
{{end}}
