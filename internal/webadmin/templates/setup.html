{{/* ABOUTME: Initial setup wizard — Svelte island with noscript fallback */}}
{{/* ABOUTME: Creates first admin user and optional API principal */}}
{{define "content"}}
<div data-island="setup-form">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div class="min-h-screen flex items-center justify-center p-4">
    <form method="POST" action="/setup" class="w-full max-w-sm space-y-4">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      {{if .Error}}<p class="text-red-600">{{.Error}}</p>{{end}}
      <input type="text" name="username" placeholder="Username" required class="w-full p-2 border">
      <input type="text" name="display_name" placeholder="Display Name" required class="w-full p-2 border">
      <input type="password" name="password" placeholder="Password" required class="w-full p-2 border">
      <label class="flex items-center gap-2">
        <input type="checkbox" name="create_principal" checked>
        Create API principal
      </label>
      <button type="submit" class="w-full p-2 bg-blue-600 text-white">Complete Setup</button>
    </form>
  </div>
</noscript>
{{end}}
