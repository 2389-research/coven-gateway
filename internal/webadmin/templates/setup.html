{{/* ABOUTME: Initial setup wizard — Svelte island with noscript fallback */}}
{{/* ABOUTME: Creates first admin user and optional API principal */}}
{{define "content"}}
<div data-island="setup-form">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <form method="POST" action="/setup" style="width:100%;max-width:24rem">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      {{if .Error}}<p style="color:#dc2626;margin-bottom:0.5rem">{{.Error}}</p>{{end}}
      <label style="display:block;margin-bottom:0.75rem">Username
        <input type="text" name="username" required style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <label style="display:block;margin-bottom:0.75rem">Display Name
        <input type="text" name="display_name" required style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <label style="display:block;margin-bottom:0.75rem">Password
        <input type="password" name="password" required style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <label style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem">
        <input type="checkbox" name="create_principal" checked>
        Create API principal
      </label>
      <button type="submit" style="width:100%;padding:0.5rem;background:#2563eb;color:#fff;border:none;cursor:pointer">Complete Setup</button>
    </form>
  </div>
</noscript>
{{end}}
