{{/* ABOUTME: Minimal base layout — Vite handles all styles and scripts */}}
{{/* ABOUTME: Each page island owns its own chrome via AdminLayout.svelte */}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} | Coven</title>
    {{ scriptTags "src/islands/auto.ts" }}
</head>
<body class="bg-[var(--cg-bg)] text-[var(--cg-fg)] font-[var(--typography-fontFamily-sans)] antialiased">
    <div class="min-h-screen">
        {{template "content" .}}
    </div>
    <div style="position:fixed;bottom:0.75rem;right:0.75rem;z-index:50;">
        <div data-island="connection-badge">
            <script type="application/json">{"url":"/api/health/stream"}</script>
        </div>
    </div>
</body>
</html>
