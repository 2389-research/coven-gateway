{{/* ABOUTME: Invite acceptance page — Svelte island with noscript fallback */}}
{{/* ABOUTME: New user registration via invite token */}}
{{define "content"}}
<div data-island="invite-form">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div class="min-h-screen flex items-center justify-center p-4">
    <form method="POST" action="/invite/{{.Token}}" class="w-full max-w-sm space-y-4">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      {{if .Error}}<p class="text-red-600">{{.Error}}</p>{{end}}
      <input type="text" name="username" placeholder="Username" required class="w-full p-2 border">
      <input type="text" name="display_name" placeholder="Display Name" class="w-full p-2 border">
      <input type="password" name="password" placeholder="Password" required class="w-full p-2 border">
      <button type="submit" class="w-full p-2 bg-blue-600 text-white">Create Account</button>
    </form>
  </div>
</noscript>
{{end}}
