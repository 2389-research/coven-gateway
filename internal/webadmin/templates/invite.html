{{/* ABOUTME: Invite acceptance page — Svelte island with noscript fallback */}}
{{/* ABOUTME: New user registration via invite token */}}
{{define "content"}}
<div data-island="invite-form">
  <script type="application/json">{{.PropsJSON}}</script>
</div>
<noscript>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <form method="POST" action="/invite/{{.Token}}" style="width:100%;max-width:24rem">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      {{if .Error}}<p style="color:#dc2626;margin-bottom:0.5rem">{{.Error}}</p>{{end}}
      <label style="display:block;margin-bottom:0.75rem">Username
        <input type="text" name="username" required style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <label style="display:block;margin-bottom:0.75rem">Display Name
        <input type="text" name="display_name" style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <label style="display:block;margin-bottom:0.75rem">Password
        <input type="password" name="password" required minlength="8" autocomplete="new-password" style="display:block;width:100%;padding:0.5rem;border:1px solid #ccc">
      </label>
      <button type="submit" style="width:100%;padding:0.5rem;background:#2563eb;color:#fff;border:none;cursor:pointer">Create Account</button>
    </form>
  </div>
</noscript>
{{end}}
